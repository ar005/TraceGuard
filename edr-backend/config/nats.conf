# config/nats.conf — NATS JetStream configuration for TraceGuard XDR
#
# Mount this file into the nats container:
#   docker run -v $(pwd)/config/nats.conf:/etc/nats/nats.conf nats:alpine -c /etc/nats/nats.conf
#
# Or use the docker-compose service which mounts it automatically.

# Listen on all interfaces
host: 0.0.0.0
port: 4222

# HTTP monitoring endpoint (metrics, connz, routez)
http_port: 8222

# JetStream — persistent message streaming for the XDR pipeline
jetstream {
  store_dir: /var/lib/nats/jetstream

  # Memory store limit (for in-flight messages before spill to disk)
  max_memory_store: 512MB

  # File store limit (total on-disk size for all streams)
  # Tune to available disk; 10GB is sufficient for ~24h of typical EDR+network events
  max_file_store: 10GB
}

# Max message payload (must match natsbus.MaxMsgSize = 1MB)
max_payload: 1MB

# Client connection limits
max_connections: 1024

# Logging
log_time: true
debug: false
trace: false
