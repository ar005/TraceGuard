# config/server.yaml — EDR Backend Configuration

server:
  grpc_addr: ":50051"
  http_addr: ":8080"
  # node_id is included in /health and /healthz responses for LB debugging.
  # Defaults to the hostname when unset.
  node_id: ""
  tls:
    enabled:   false          # set true + fill cert/key to enable TLS on gRPC
    cert_file: "/etc/edr/tls/server.crt"
    key_file:  "/etc/edr/tls/server.key"
    ca_file:   ""             # set for mutual TLS (client cert required)

database:
  host:     "postgres"
  port:     5432
  name:     "edr"
  user:     "edr"
  password: "edr"
  ssl_mode: "disable"
  # read_url: "postgres://edr:edr@postgres-replica:5432/edr?sslmode=disable"
  # When set, heavy read queries (events, alerts, agents) route to this replica.
  # Writes always go to the primary above. Env override: EDR_DATABASE_READ_URL.
  read_url: ""

log:
  level:  "info"
  format: "json"

auth:
  api_key: ""

# NATS JetStream — XDR pipeline backbone.
# Set enabled: true to decouple detection from ingest and unlock multi-source ingestion.
# When disabled (default), detection runs inline — single-node EDR mode, no NATS required.
# Env override: EDR_NATS_ENABLED=true / EDR_NATS_URL=nats://nats:4222
nats:
  enabled: false
  url:     "nats://nats:4222"

# Rate limiting: per-IP token bucket.
# Protects against DoS and brute-force. Set enabled: false to disable.
rate_limit:
  enabled: true
  requests_per_second: 20   # sustained rate per IP
  burst: 40                  # max burst size per IP

# IOC Feeds: automatically download threat intelligence from public feeds.
# Feeds: Abuse.ch Feodo Tracker (C2 IPs), URLhaus (malicious domains),
#         MalwareBazaar (malware hashes), Emerging Threats (compromised IPs).
# IOCs are matched in real-time against incoming events (IPs, domains, hashes).
ioc_feed:
  enabled: true
  sync_interval: "6h"   # how often to refresh feeds (minimum 1m)

# Retention: auto-delete old data to prevent disk fill.
# Set to 0 to disable. Alerts are only deleted when CLOSED/RESOLVED.
retention:
  event_days: 90    # delete events older than 90 days
  alert_days:  0    # 0 = keep all alerts (only closed ones would be deleted)
