services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: edr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       edr
      POSTGRES_USER:     edr
      POSTGRES_PASSWORD: edr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edr"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── EDR Backend ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: edr-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      EDR_DATABASE_HOST:     postgres
      EDR_DATABASE_PORT:     5432
      EDR_DATABASE_NAME:     edr
      EDR_DATABASE_USER:     edr
      EDR_DATABASE_PASSWORD: edr
      EDR_DATABASE_SSL_MODE: disable
      EDR_SERVER_GRPC_ADDR:  ":50051"
      EDR_SERVER_HTTP_ADDR:  ":8080"
      EDR_LOG_LEVEL:         info
      EDR_LOG_FORMAT:        json
      EDR_JWT_SECRET:         change-this-to-a-long-random-secret-in-production
    ports:
      - "50051:50051"   # gRPC (agents connect here)
      - "8080:8080"     # REST API
    volumes:
      - ./config:/app/config:ro
      - ./certs:/etc/edr/tls:ro   # mount TLS certs; create with: make gen-certs

volumes:
  postgres_data:
