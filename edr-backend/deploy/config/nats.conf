# NATS JetStream configuration for TraceGuard XDR pipeline.
# Mounted read-only into the nats container at /etc/nats/nats.conf.
# Reference: https://docs.nats.io/running-a-nats-service/configuration

# Bind on all interfaces — Docker bridge network.
host: 0.0.0.0
port: 4222

# HTTP monitoring endpoint (exposed on :8222).
http_port: 8222

# JetStream — enables persistent streaming for the XDR event pipeline.
jetstream {
  store_dir:        /var/lib/nats/jetstream
  max_memory_store: 512MB
  max_file_store:   10GB
}

# Connection limits — sized for a self-hosted single-node deployment.
max_connections: 4096
max_payload:     1MB
max_pending:     64MB
write_deadline:  "10s"

# Logging to stdout so Docker captures it.
logtime: true
