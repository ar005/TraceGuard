version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: edr
      POSTGRES_USER: edr
      POSTGRES_PASSWORD: edrpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edr"]
      interval: 5s
      timeout: 3s
      retries: 5

  edr-backend:
    build: ./edr-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      EDR_DATABASE_HOST: postgres
      EDR_DATABASE_PORT: "5432"
      EDR_DATABASE_USER: edr
      EDR_DATABASE_PASSWORD: edrpass
      EDR_DATABASE_NAME: edr
      EDR_JWT_SECRET: change-me-in-production
    ports:
      - "8080:8080"
      - "50051:50051"

volumes:
  pgdata: