version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${EDR_DB_NAME:-edr}
      POSTGRES_USER: ${EDR_DB_USER:-edr}
      POSTGRES_PASSWORD: ${EDR_DB_PASSWORD:?Set EDR_DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # DB is internal-only — no host port mapping. Use `docker exec` for admin access.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend ─────────────────────────────────────────────────
  edr-backend:
    build: ./edr-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      EDR_DATABASE_HOST: postgres
      EDR_DATABASE_PORT: "5432"
      EDR_DATABASE_USER: ${EDR_DB_USER:-edr}
      EDR_DATABASE_PASSWORD: ${EDR_DB_PASSWORD:?Set EDR_DB_PASSWORD in .env}
      EDR_DATABASE_NAME: ${EDR_DB_NAME:-edr}
      EDR_JWT_SECRET: ${EDR_JWT_SECRET:?Set EDR_JWT_SECRET in .env}
      EDR_CORS_ORIGINS: ${EDR_CORS_ORIGINS:-}
    ports:
      - "8080:8080"
      - "50051:50051"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/setup/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Dashboard (edr-ui3 — Next.js) ──────────────────────────
  edr-ui3:
    build:
      context: ./edr-ui3
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
    restart: unless-stopped
    depends_on:
      - edr-backend
    ports:
      - "5002:5002"

  # ── Legacy UI (edr-ui — Flask) ──────────────────────────────
  edr-ui:
    build: ./edr-ui
    restart: unless-stopped
    depends_on:
      - edr-backend
    environment:
      EDR_BACKEND: http://edr-backend:8080
    ports:
      - "5000:5000"

volumes:
  pgdata: