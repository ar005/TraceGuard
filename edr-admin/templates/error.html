<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OEDR — Error</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg0:#04080e;--line:#16253a;--text:#c8dced;--muted:#3a5570;--red:#f03a3a;--cyan:#00c8f0;--mono:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--mono);background:var(--bg0);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{max-width:480px;padding:0 20px;text-align:center}
.icon{font-size:40px;margin-bottom:16px;opacity:.6}
h1{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--red);margin-bottom:14px}
p{font-size:10px;color:var(--muted);line-height:1.8;margin-bottom:24px;letter-spacing:.3px}
a{display:inline-block;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:8px 16px;border:1px solid var(--line);color:var(--muted);text-decoration:none;border-radius:2px;transition:all .15s}
a:hover{border-color:var(--cyan);color:var(--cyan)}
</style>
</head>
<body>
<div class="box">
  <div class="icon">⚠</div>
  <h1>Connection Error</h1>
  <p>{{ message }}</p>
  <a href="/">Try Again</a>
</div>
</body>
</html>
