<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #e0e0e0;
      background: #1a1a2e;
    }
    h3 {
      margin: 0 0 8px 0;
      color: #00d4aa;
      font-size: 14px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 8px;
      border-radius: 6px;
      background: #16213e;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .dot.on { background: #2ecc71; }
    .dot.off { background: #e74c3c; }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px;
    }
    .stat-box {
      text-align: center;
      padding: 6px;
      border-radius: 4px;
      background: #16213e;
    }
    .stat-box .num {
      font-size: 18px;
      font-weight: bold;
      color: #00d4aa;
    }
    .stat-box .label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
    }
    .config-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    input[type="text"] {
      flex: 1;
      padding: 4px 6px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 12px;
    }
    button {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      background: #00d4aa;
      color: #1a1a2e;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
    }
    button:hover { background: #00b894; }
    button.danger { background: #e74c3c; }
    button.danger:hover { background: #c0392b; }
    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .footer {
      margin-top: 8px;
      font-size: 10px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>
  <h3>OEDR Browser Monitor</h3>

  <div class="status" id="statusBar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Loading...</span>
    <div style="flex:1"></div>
    <button id="toggleBtn" style="font-size:11px; padding:3px 8px;">--</button>
  </div>

  <div class="stats">
    <div class="stat-box">
      <div class="num" id="captured">0</div>
      <div class="label">Captured</div>
    </div>
    <div class="stat-box">
      <div class="num" id="sent">0</div>
      <div class="label">Sent</div>
    </div>
    <div class="stat-box">
      <div class="num" id="errors">0</div>
      <div class="label">Errors</div>
    </div>
  </div>

  <div class="config-row">
    <span style="font-size:11px; color:#888;">Agent:</span>
    <input type="text" id="agentURL" placeholder="http://127.0.0.1:9999/browser-events" />
    <button id="saveBtn" style="font-size:11px; padding:3px 8px;">Save</button>
  </div>

  <div class="footer">Events are sent to the local EDR agent only</div>

  <script src="popup.js"></script>
</body>
</html>
