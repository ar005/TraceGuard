name: edr_flutter
description: TraceGuard EDR — cross-platform analyst UI (Android, iOS, Web)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP + SSE
  dio: ^5.4.3
  http: ^1.2.1

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Persistence
  shared_preferences: ^2.3.0

  # Charts
  fl_chart: ^0.68.0

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
