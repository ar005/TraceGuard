# /etc/edr/agent.yaml
# EDR Agent Configuration

agent:
  # Auto-generated UUID if empty. Persisted to id_file.
  id: ""
  id_file: "/var/lib/edr/agent.id"
  hostname: ""   # auto-detected from OS
  backend_url: "localhost:50051"
  # Tags label this agent for filtering in the UI
  tags: []       # e.g. [prod, webserver, k8s]
  env: ""        # e.g. production | staging | dev
  notes: ""      # free-text description
  tls:
    # For production: copy ca.crt from backend's deploy/certs/ to /etc/edr/tls/
    # Then set insecure: false and point ca to the CA cert.
    cert:     ""                      # leave empty unless using mutual TLS
    key:      ""
    ca:       ""                      # /etc/edr/tls/ca.crt
    insecure: true                    # CHANGE TO false IN PRODUCTION

monitors:
  process:
    enabled: true
    max_ancestry_depth: 5
    capture_env: false   # capture env vars for suspicious processes
    suspicious_parents:
      - httpd
      - nginx
      - apache2
      - lighttpd
      - sshd
      - vsftpd
      - mysqld
      - postgres
      - java
      - python
      - python3
      - ruby
      - php
      - node
      - crond
      - atd

  network:
    enabled: true
    ignore_localhost: true   # suppress 127.0.0.1 / ::1 connections
    capture_payload: false   # DO NOT enable unless legally cleared
    # Alert even for private-range connections on these ports:
    watched_ports: [22, 23, 445, 3389, 4444, 5555, 6666, 8080, 9001]

  file:
    enabled: true
    hash_on_write: true
    capture_all_writes: false   # capture file writes from any path (requires eBPF, high volume)
    watch_paths:
      - /etc
      - /usr/bin
      - /usr/sbin
      - /usr/local/bin
      - /usr/local/sbin
      - /tmp
      - /var/tmp
      - /dev/shm
      - /root
      - /home

  registry:
    enabled: true
    # Extra paths beyond the built-in defaults
    extra_paths:
      - /etc/environment
      - /etc/profile.d

  browser:
    enabled: true              # accept events from the TraceGuard browser extension
    listen_addr: "127.0.0.1:9999"  # localhost-only HTTP endpoint for extension

  kmod:
    enabled: true
    poll_interval_s: 5

  usb:
    enabled: true
    poll_interval_s: 10

  pipe:
    enabled: true
    poll_interval_s: 10
    watch_paths:
      - /tmp
      - /var/tmp
      - /dev/shm
      - /run

  share:
    enabled: true
    poll_interval_s: 10

  memmon:
    enabled: true
    poll_interval_s: 15   # scan /proc/*/maps every 15 seconds
    ignore_comms:         # JIT compilers and browsers create legitimate RWX regions
      - java
      - node
      - python3
      - python
      - firefox
      - chrome
      - chromium
      - code

  tlssni:
    enabled: true

  fim:
    enabled: true
    poll_interval_s: 300   # check file integrity every 5 minutes
    auto_baseline: true    # create baseline on first run
    baseline_path: "/var/lib/edr/fim_baseline.json"
    watch_paths:
      - /etc/passwd
      - /etc/shadow
      - /etc/group
      - /etc/sudoers
      - /etc/sudoers.d
      - /etc/ssh/sshd_config
      - /etc/ssh/ssh_config
      - /etc/pam.d
      - /etc/hosts
      - /etc/resolv.conf
      - /etc/ld.so.preload
      - /etc/ld.so.conf
      - /etc/crontab
      - /etc/cron.d

  cronmon:
    enabled: true
    watch_paths:
      - /etc/crontab
      - /etc/cron.d
      - /etc/cron.daily
      - /etc/cron.hourly
      - /etc/cron.weekly
      - /etc/cron.monthly
      - /var/spool/cron

buffer:
  path: "/var/lib/edr/events.db"
  max_size_mb: 512
  flush_interval_s: 5

log:
  level: "info"     # debug | info | warn | error
  format: "json"    # json | text
  path: "/var/log/edr/agent.log"

self_protect:
  bin_path: ""        # auto-detected from /proc/self/exe
  watchdog: true      # respawn agent if killed
  immutable_bin: false  # chattr +i on agent binary (requir